    color: #fff;

      border-radius: 16px;

    box-shadow: 0 20px 60px rgba(0,0,0,0.35);

      -webkit-backdrop-filter: blur(14px);

      border-bottom: 1px solid rgba(255,255,255,0.2);

      display: flex;
      align-items: center;
    ">

      <!-- CLOSE -->
      <div id="windowclose" style="
        width: 22px;
        height: 22px;

        background: rgba(255, 59, 59, 0.25);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        border: 1px solid rgba(255, 59, 59, 0.4);

        border-radius: 50%;

        display: flex;
        align-items: center;
        justify-content: center;

        cursor: pointer;
        user-select: none;

        color: white;
        font-weight: bold;
        font-size: 14px;
      ">
        ✕
      </div>

    </div>

    <!-- CONTENT -->
    <div style="
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);

      width: 360px;
      padding: 16px;
    ">
      <img src="logo.png" style="width:64px;height:64px;border-radius:32px;">
      <h1 style="margin:4px;">kOS</h1>
      <p style="margin:0;">
        <dfn>kOS</dfn> is the <abbr title="yes, it is">BEST </abbr><b>OS</b>
      </p>
    </div>
  </div>
  
  <!-- WINDOW -->
  <div id="notes" style="
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 9;

    border-radius: 16px;
    overflow: hidden;

    box-shadow: 0 20px 60px rgba(0,0,0,0.35);

    display: none;
  ">

    <!-- HEADER (GLASS) -->
    <div id="notesheader" style="
      padding: 10px;

      background: rgba(255, 255, 255, 0.12);

      -webkit-backdrop-filter: blur(14px);

      border-bottom: 1px solid rgba(255,255,255,0.2);

      align-items: center;
    ">

      <!-- CLOSE -->
      <div id="notesclose" style="
        width: 22px;
        height: 22px;

        background: rgba(255, 59, 59, 0.25);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        border: 1px solid rgba(255, 59, 59, 0.4);

        border-radius: 50%;

        display: flex;
        align-items: center;
        justify-content: center;

        cursor: pointer;
        user-select: none;

        color: white;
        font-weight: bold;
        font-size: 14px;
      ">
        ✕
      </div>

    </div>

    <!-- CONTENT -->
    <div style="
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);

      width: 360px;
      padding: 16px;
      background-image: url(notes.png);
      background-size: cover;
    ">
      <h1 style="margin:4px; text-align: center; color: red;">Notes</h1>

<textarea style="
  width:100%;
  height:250px;
  resize:none;
  border:none;
  outline:none;
  background:transparent;
  font-family:inherit;
  font-size:16px;
  margin-left: 50px;
" placeholder="Write something..."></textarea>
    </div>
  </div>
  <!-- ABOUT ME WINDOW -->
<div id="about" style="
  position: absolute;
  left: 60%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 9;

  border-radius: 16px;
  overflow: hidden;

  box-shadow: 0 20px 60px rgba(255, 0, 0, 0.35);

  display: none;
">

  <div id="aboutheader" style="
    padding: 10px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border-bottom: 1px solid rgba(255,255,255,0.2);

    display: flex;
    align-items: center;
  ">

    <div id="aboutclose" style="
      width: 22px;
      height: 22px;

      background: rgba(255, 59, 59, 0.25);
      border: 1px solid rgba(255, 59, 59, 0.4);

      border-radius: 50%;

  <div style="
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);

    width: 400px;

  ">

    <p>Hello! I'm Kaan.</p>
    <p>I love programming, aerospace and engineering.</p>
    <p>Welcome to kOS.</p>
  </div>

</div>
<div id="weather" style="
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  z-index:10;

  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);

  display:none;
">
  <div id="weatherheader" style="
    padding:10px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:rgb(255, 255, 255);
  ">
    <span>Weather</span>

    <div id="weatherclose" style="
      width:22px;height:22px;
      border-radius:50%;
      background:rgba(255,59,59,0.25);
      border:1px solid rgba(255,59,59,0.4);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-weight:bold;
    ">✕</div>
  </div>

  <div style="
    background:rgba(0, 89, 255, 0.92);
    width:320px;
    padding:16px;
  ">
    <h2 style="color: #fff;">Local Weather</h2>
    <div style="color:white;">
      🌡️ Temp: <span id="temp">-</span> °C
    </div>

    <div style="color:white;">
      💨 Wind: <span id="wind">-</span> km/h
    </div>
  </div>
</div>
<div id="calculator" class="window" style="display:none;">
  <div class="window-header" style="padding:10px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:rgb(255, 255, 255);
  ">
  <div id="calcclose" style="
      width:22px;height:22px;
      border-radius:50%;
      background:rgba(255,59,59,0.25);
      border:1px solid rgba(255,59,59,0.4);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-weight:bold;
    ">✕</div>
    <span>Calculator</span>
  </div>

  <div style="padding:15px;">
    <input
      id="calcDisplay"
      type="text"
      readonly
      style="width:93%;padding:10px;font-size:20px;margin-bottom:10px; background: #fff;"
    >

    <div class="calc-buttons">
      <button onclick="addCalc('7')">7</button>
      <button onclick="addCalc('8')">8</button>
      <button onclick="addCalc('9')">9</button>
      <button class="op" onclick="addCalc('/')">÷</button>

      <button onclick="addCalc('4')">4</button>
      <button onclick="addCalc('5')">5</button>
      <button onclick="addCalc('6')">6</button>
      <button class="op" onclick="addCalc('*')">×</button>

      <button onclick="addCalc('1')">1</button>
      <button onclick="addCalc('2')">2</button>
      <button onclick="addCalc('3')">3</button>
      <button class="op" onclick="addCalc('-')">−</button>

      <button onclick="addCalc('0')">0</button>
      <button onclick="addCalc('.')">.</button>
      <button class="eq" onclick="calculate()">=</button>
      <button class="op" onclick="addCalc('+')">+</button>

      <button onclick="clearCalc()" style="grid-column: span 4;">
        Clear
      </button>
    </div>
  </div>
</div>
  
  <style>
    #calculator .window-header {
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.2);
  color: white;
}
#calcDisplay {
  background: #f2f2f2;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 28px;
  text-align: right;
  color: #000;
}
.calc-buttons button {
  padding: 16px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  transition: 0.15s;
}
.calc-buttons button:not(.op):not(.eq) {
  background: #e5e5ea;
  color: #000;
}
.calc-buttons .op {
  background: #ff9500;
  color: white;
}
.calc-buttons .eq {
  background: #ff7a00;
  color: white;
}
    .window {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;

  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}
.calc-buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
}

.calc-buttons button{
  padding:12px;
  font-size:18px;
  cursor:pointer;
}
.appIcon {
  text-align: center;
  padding: 16px;
  width: fit-content;
  border-radius: 12px;
  filter: drop-shadow(0 0 8px black);
}

.selected {
  background: rgba(255,255,255,0.15);
}
</style>

</div>

</div>
